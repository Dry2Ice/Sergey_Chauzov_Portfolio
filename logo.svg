<svg width="860" height="220" viewBox="0 0 860 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sergey Chauzov logo</title>
  <desc id="desc">Gradient logo with initials SC and full name</desc>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23256f"/>
      <stop offset="0.55" stop-color="#0089ad"/>
      <stop offset="1" stop-color="#00d1c9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="844" height="204" rx="28" fill="rgba(194,194,194,0.07)" stroke="url(#g1)" stroke-width="2"/>
  <circle cx="108" cy="110" r="62" fill="url(#g1)" filter="url(#glow)"/>
  <path d="M84 92C90 78 109 74 122 83C129 88 133 96 133 105C133 119 121 131 105 131C92 131 79 123 75 111" stroke="#F2F6F8" stroke-width="10" stroke-linecap="round"/>
  <text x="190" y="103" fill="#F2F6F8" font-family="Manrope, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="1">SERGEY CHAUZOV</text>
  <text x="190" y="145" fill="#C2C2C2" font-family="Manrope, Arial, sans-serif" font-size="23" font-weight="600" letter-spacing="4">WEB DESIGN • UI/UX • FRONT-END</text>
